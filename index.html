<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Concept Visualizer</title>
    
    <!-- 1. Load Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 2. Set up Import Map for React and dependencies -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.2.0",
          "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
          "lucide-react": "https://esm.sh/lucide-react@0.292.0?external=react"
        }
      }
    </script>
    
    <!-- 3. Load Babel to translate React JSX code in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <!-- This is where our React app will be injected -->
    <div id="root"></div>

    <!-- 4. Our Application Logic -->
    <script type="text/babel" data-type="module">
        // Import React and ReactDOM natively via the Import Map
        import React, { useState, useRef, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        
        // Import our Icons
        import { Edit3, Eye, RotateCcw, Box, Triangle, Sparkles, X, Copy, Check, Trash2, BrainCircuit, Map } from 'lucide-react';

        const PALETTE = [
          'bg-blue-100 border-blue-300 text-slate-800',
          'bg-green-100 border-green-300 text-slate-800',
          'bg-amber-100 border-amber-300 text-slate-800',
          'bg-purple-100 border-purple-300 text-slate-800',
          'bg-rose-100 border-rose-300 text-slate-800',
          'bg-cyan-100 border-cyan-300 text-slate-800',
        ];

        const DEFAULT_FACES = [
          { id: 1, icon: '⚡', title: 'ATP-PC System', content: '• Alactic / Phosphagen system\n• 0 - 10 seconds of explosive activity\n• E.g., 100m sprint, 1RM weightlift\n• Uses stored ATP and Phosphocreatine\n• No oxygen required (Anaerobic)', color: 0 },
          { id: 2, icon: '🏃', title: 'Lactic Acid System', content: '• Anaerobic Glycolysis\n• 10 seconds to 3 minutes of high intensity\n• E.g., 400m sprint, fast rally in tennis\n• Breaks down carbohydrates (glycogen)\n• Produces lactic acid as a byproduct', color: 1 },
          { id: 3, icon: '🫁', title: 'Aerobic System', content: '• Oxygen dependent\n• 3+ minutes of sustained, lower intensity\n• E.g., Marathon running, cycling\n• Breaks down carbs, fats, and sometimes proteins\n• Produces no fatiguing byproducts (water & CO2)', color: 2 },
          { id: 4, icon: '🔄', title: 'Energy Continuum', content: 'All systems work together at all times.\n\nThe dominant system depends on:\n1. Intensity of the exercise\n2. Duration of the exercise', color: 3 },
          { id: 5, icon: '🔋', title: 'Recovery (EPOC)', content: 'Excess Post-exercise Oxygen Consumption.\n\nAfter exercise, the body breathes heavily to take in extra oxygen to repay the oxygen debt and restore ATP-PC stores.', color: 4 },
          { id: 6, icon: '💪', title: 'Muscle Fiber Types', content: '• Type I (Slow Twitch): Aerobic, fatigue resistant.\n• Type IIa (Fast Oxidative): Hybrid.\n• Type IIx (Fast Glycolytic): ATP-PC/Lactic, highly explosive, fatigues quickly.', color: 5 },
        ];

        const getFaceTransform = (shape, index, isUnfolded) => {
          if (isUnfolded) {
            if (shape === 'prism') {
              const offsets = ['translateX(-320px)', 'translateX(0px)', 'translateX(320px)'];
              return `${offsets[index]} translateZ(0px) rotateY(0deg)`;
            } else {
              const offsets = [
                'translateX(-160px) translateY(0px)',     
                'translateX(160px) translateY(0px)',      
                'translateX(480px) translateY(0px)',      
                'translateX(-480px) translateY(0px)',     
                'translateX(-160px) translateY(-320px)',  
                'translateX(-160px) translateY(320px)'    
              ];
              return `${offsets[index]} translateZ(0px) rotateY(0deg) rotateX(0deg)`;
            }
          } else {
            if (shape === 'prism') {
              return `rotateY(${index * 120}deg) translateZ(87px)`;
            } else {
              const transforms = [
                'rotateY(0deg) translateZ(150px)',     
                'rotateY(90deg) translateZ(150px)',    
                'rotateY(180deg) translateZ(150px)',   
                'rotateY(-90deg) translateZ(150px)',   
                'rotateX(90deg) translateZ(150px)',    
                'rotateX(-90deg) translateZ(150px)'    
              ];
              return transforms[index];
            }
          }
        };

        function App() {
          const [mode, setMode] = useState('view');
          
          const [shape, setShape] = useState(() => {
            try { return localStorage.getItem('concept3d-shape') || 'prism'; } 
            catch { return 'prism'; }
          });
          
          const [faces, setFaces] = useState(() => {
            try { 
              const saved = localStorage.getItem('concept3d-faces');
              return saved ? JSON.parse(saved) : DEFAULT_FACES;
            } catch { return DEFAULT_FACES; }
          });

          const [rotation, setRotation] = useState({ x: -15, y: -25 });
          const [isDragging, setIsDragging] = useState(false);
          const dragStart = useRef({ x: 0, y: 0 });
          const [hasDragged, setHasDragged] = useState(false);

          const [isQuizMode, setIsQuizMode] = useState(false);
          const [revealedFaces, setRevealedFaces] = useState([]);
          const [isUnfolded, setIsUnfolded] = useState(false);
          const [showPrompt, setShowPrompt] = useState(false);
          const [copied, setCopied] = useState(false);

          // New State for Dynamic AI Prompt Builder
          const [promptTopic, setPromptTopic] = useState('');
          const [promptCourse, setPromptCourse] = useState('OCR A Level PE');

          const activeFaces = shape === 'prism' ? faces.slice(0, 3) : faces;
          const sidesCount = shape === 'prism' ? 3 : 6;

          // Dynamically generating the prompt so the student doesn't have to fill in brackets
          const dynamicPrompt = `Act as an expert Anatomy & Physiology tutor for the ${promptCourse} syllabus.
I am a dyslexic student using a 3D visualization tool to revise. I need to break down the topic of "${promptTopic || '[Your Topic]'}" into exactly ${sidesCount} distinct sides of a 3D shape.

Because these sides physically connect in 3D and can unfold into a flat 2D map, structure the content so there is a logical flow or inter-relationship from Side 1 through to the final side.

Please provide the content formatted exactly like this:

Side 1: [Single Emoji that visually represents the topic] [Short Title]
• [Very short bullet point, max 10 words]
• [Very short bullet point]
• [Relationship: e.g., "Leads to anaerobic glycolysis..."]

(Continue for all ${sidesCount} sides requested)

Crucial Rules:
1. Use simple, plain English. 
2. Strictly limit to 3-5 bullet points per side.
3. Emphasize how one side connects to or causes the next.
4. Do not write paragraphs or walls of text. 
5. Only include information strictly required by the specified syllabus.
6. MANDATORY: You must include exactly ONE highly relevant emoji at the start of every title to act as a visual memory anchor (Dual Coding).`;

          useEffect(() => {
            try {
              localStorage.setItem('concept3d-shape', shape);
              localStorage.setItem('concept3d-faces', JSON.stringify(faces));
            } catch (error) {
              console.warn('Local storage is not available.');
            }
          }, [shape, faces]);

          const handleDragStart = (clientX, clientY) => {
            if (mode === 'edit' || isUnfolded) return;
            setIsDragging(true);
            setHasDragged(false);
            dragStart.current = { x: clientX, y: clientY };
          };

          const handleDragMove = (clientX, clientY) => {
            if (!isDragging || mode === 'edit' || isUnfolded) return;
            setHasDragged(true);
            const deltaX = clientX - dragStart.current.x;
            const deltaY = clientY - dragStart.current.y;
            
            setRotation(prev => ({
              x: prev.x - deltaY * 0.5,
              y: prev.y + deltaX * 0.5
            }));
            
            dragStart.current = { x: clientX, y: clientY };
          };

          const handleDragEnd = () => setIsDragging(false);

          const handleFaceChange = (id, field, value) => {
            setFaces(faces.map(f => f.id === id ? { ...f, [field]: value } : f));
          };

          const resetToDefaults = () => {
            if(window.confirm('Are you sure you want to reset all content to the default Energy Systems example?')) {
              setFaces(DEFAULT_FACES);
              setShape('prism');
              setRotation({ x: -15, y: -25 });
              setIsUnfolded(false);
              setIsQuizMode(false);
              setRevealedFaces([]);
            }
          };

          const copyToClipboard = () => {
            const textArea = document.createElement("textarea");
            textArea.value = dynamicPrompt;
            document.body.appendChild(textArea);
            textArea.select();
            try {
              document.execCommand('copy');
              setCopied(true);
              setTimeout(() => setCopied(false), 2000);
            } catch (err) {
              console.error('Copy failed', err);
            }
            document.body.removeChild(textArea);
          };

          const snapToFace = (index) => {
            if (shape === 'prism') {
              const angles = [0, -120, -240];
              setRotation({ x: 0, y: angles[index] });
            } else {
              const angles = [
                { x: 0, y: 0 },       
                { x: 0, y: -90 },     
                { x: 0, y: -180 },    
                { x: 0, y: 90 },      
                { x: -90, y: 0 },     
                { x: 90, y: 0 }       
              ];
              setRotation(angles[index]);
            }
          };

          return (
            <div className="min-h-screen bg-gradient-to-br from-slate-100 via-indigo-50/50 to-purple-50/50 font-sans flex flex-col selection:bg-purple-200">
              
              <header className="bg-white/80 backdrop-blur-md shadow-sm border-b border-white/50 p-4 flex flex-wrap gap-4 items-center justify-between z-10">
                <div>
                  <h1 className="text-2xl font-extrabold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">3D Concept Visualizer</h1>
                  <p className="text-sm font-medium text-slate-500">Dyslexia-friendly spatial learning space</p>
                </div>
                
                <div className="flex flex-wrap gap-4 items-center">
                  <button
                    onClick={() => setShowPrompt(true)}
                    className="flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-bold bg-purple-100 text-purple-700 hover:bg-purple-200 hover:scale-105 active:scale-95 transition-all shadow-sm"
                  >
                    <Sparkles size={18} /> AI Prompt Guide
                  </button>

                  <div className="flex bg-slate-200/50 p-1.5 rounded-xl backdrop-blur-sm">
                    <button 
                      onClick={() => setShape('prism')}
                      className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all ${shape === 'prism' ? 'bg-white shadow-md text-indigo-600 scale-100' : 'text-slate-500 hover:text-slate-700 hover:bg-white/50'}`}
                      aria-label="Switch to 3-sided Prism shape"
                    >
                      <Triangle size={16} /> 3-Sided
                    </button>
                    <button 
                      onClick={() => setShape('cube')}
                      className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all ${shape === 'cube' ? 'bg-white shadow-md text-indigo-600 scale-100' : 'text-slate-500 hover:text-slate-700 hover:bg-white/50'}`}
                      aria-label="Switch to 6-sided Cube shape"
                    >
                      <Box size={16} /> 6-Sided
                    </button>
                  </div>

                  <div className="flex bg-slate-200/50 p-1.5 rounded-xl backdrop-blur-sm">
                    <button 
                      onClick={() => { setMode('view'); setRotation({x: -15, y: -25}); setIsUnfolded(false); }}
                      className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all ${mode === 'view' ? 'bg-white shadow-md text-indigo-600 scale-100' : 'text-slate-500 hover:text-slate-700 hover:bg-white/50'}`}
                    >
                      <Eye size={18} /> Interactive View
                    </button>
                    <button 
                      onClick={() => { setMode('edit'); setIsUnfolded(false); setIsQuizMode(false); }}
                      className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold transition-all ${mode === 'edit' ? 'bg-white shadow-md text-indigo-600 scale-100' : 'text-slate-500 hover:text-slate-700 hover:bg-white/50'}`}
                    >
                      <Edit3 size={18} /> Edit Content
                    </button>
                  </div>
                </div>
              </header>

              <main className="flex-1 flex flex-col lg:flex-row overflow-hidden">
                
                <div className="flex-1 relative flex flex-col">
                  {mode === 'view' && (
                     <div className="absolute top-6 left-0 right-0 text-center pointer-events-none z-10">
                       <span className="bg-white/60 backdrop-blur-md px-4 py-2 rounded-full text-sm font-bold text-slate-500 shadow-sm border border-white/50">
                         {isUnfolded ? '✨ Viewing 2D Concept Map' : '✨ Click and drag to rotate in 3D'}
                       </span>
                     </div>
                  )}

                  <div 
                    className="flex-1 flex items-center justify-center touch-none select-none"
                    onMouseDown={(e) => handleDragStart(e.clientX, e.clientY)}
                    onMouseMove={(e) => handleDragMove(e.clientX, e.clientY)}
                    onMouseUp={handleDragEnd}
                    onMouseLeave={handleDragEnd}
                    onTouchStart={(e) => handleDragStart(e.touches[0].clientX, e.touches[0].clientY)}
                    onTouchMove={(e) => handleDragMove(e.touches[0].clientX, e.touches[0].clientY)}
                    onTouchEnd={handleDragEnd}
                    style={{ perspective: '1200px', WebkitPerspective: '1200px' }}
                  >
                    <div 
                      className={`relative ${!isDragging ? 'transition-transform duration-700 ease-in-out' : ''}`}
                      style={{
                        width: '300px',
                        height: '300px',
                        transformStyle: 'preserve-3d',
                        WebkitTransformStyle: 'preserve-3d',
                        transform: isUnfolded 
                          ? `scale(${shape === 'cube' ? 0.35 : 0.55}) translateZ(-150px) rotateX(0deg) rotateY(0deg)` 
                          : `rotateX(${rotation.x}deg) rotateY(${rotation.y}deg)`,
                        cursor: isDragging ? 'grabbing' : (mode === 'view' && !isUnfolded ? 'grab' : 'default')
                      }}
                    >
                      {activeFaces.map((face, index) => {
                        const transform = getFaceTransform(shape, index, isUnfolded);
                        const isHidden = isQuizMode && !revealedFaces.includes(face.id);

                        return (
                          <div 
                            key={face.id}
                            onClick={() => {
                              if (!hasDragged && isQuizMode) {
                                setRevealedFaces(prev => prev.includes(face.id) ? prev.filter(id => id !== face.id) : [...prev, face.id]);
                              }
                            }}
                            className={`absolute w-full h-full border-[3px] border-white rounded-2xl p-6 flex flex-col shadow-[0_20px_50px_rgba(8,_112,_184,_0.15)] ${PALETTE[face.color]} ${isQuizMode ? 'cursor-pointer hover:border-indigo-400' : ''} ${!isDragging ? 'transition-all duration-700' : ''} ${isDragging ? 'pointer-events-none' : ''}`}
                            style={{
                              transform,
                              backfaceVisibility: isUnfolded ? 'visible' : 'hidden', 
                              WebkitBackfaceVisibility: isUnfolded ? 'visible' : 'hidden',
                            }}
                          >
                            <div className={`transition-all duration-500 flex flex-col flex-1 min-h-0 ${isHidden ? 'blur-xl opacity-0 select-none' : 'blur-0 opacity-100'}`}>
                              <h2 className="text-xl font-extrabold mb-4 border-b-2 border-current/20 pb-2 flex items-center gap-3 shrink-0">
                                <span className="text-3xl bg-white/50 p-1.5 rounded-lg shadow-sm leading-none">{face.icon || '✨'}</span>
                                {face.title}
                              </h2>
                              <div className="whitespace-pre-wrap text-[1.05rem] font-medium leading-relaxed overflow-y-auto pr-2 custom-scrollbar text-slate-700 flex-1 min-h-0">
                                {face.content}
                              </div>
                            </div>

                            {isHidden && (
                              <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-10">
                                <span className="text-8xl drop-shadow-xl mb-6 transform transition-transform duration-500 hover:scale-110">
                                  {face.icon || '❓'}
                                </span>
                                <span className="bg-white/95 text-indigo-700 font-extrabold px-6 py-3 rounded-full shadow-lg border-2 border-indigo-100 backdrop-blur-sm animate-bounce">
                                  Tap to Reveal
                                </span>
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>

                  {mode === 'view' && (
                    <div className="p-6 flex flex-col gap-4 items-center border-t border-slate-200/50 bg-white/30 backdrop-blur-sm z-10">
                      <div className="flex flex-wrap justify-center gap-3">
                        <button
                          onClick={() => { setIsQuizMode(!isQuizMode); setRevealedFaces([]); }}
                          className={`px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition-all shadow-md hover:scale-105 active:scale-95 border-2 ${isQuizMode ? 'bg-indigo-600 text-white border-indigo-600' : 'bg-white text-indigo-600 border-indigo-100 hover:border-indigo-300'}`}
                        >
                          <BrainCircuit size={18} /> {isQuizMode ? 'Exit Quiz Mode' : 'Active Recall Quiz'}
                        </button>
                        <button
                          onClick={() => setIsUnfolded(!isUnfolded)}
                          className={`px-5 py-2.5 rounded-xl text-sm font-bold flex items-center gap-2 transition-all shadow-md hover:scale-105 active:scale-95 border-2 ${isUnfolded ? 'bg-purple-600 text-white border-purple-600' : 'bg-white text-purple-600 border-purple-100 hover:border-purple-300'}`}
                        >
                          <Map size={18} /> {isUnfolded ? 'Fold back to 3D' : 'Unfold to 2D Map'}
                        </button>
                      </div>

                      {!isUnfolded && (
                        <div className="flex gap-3 overflow-x-auto justify-center max-w-full pb-2 pt-2">
                          {activeFaces.map((face, idx) => (
                            <button
                              key={face.id}
                              onClick={() => snapToFace(idx)}
                              className={`px-5 py-2.5 rounded-xl text-sm font-bold whitespace-nowrap transition-all hover:scale-105 active:scale-95 ${PALETTE[face.color].split(' ')[0]} text-slate-700 border-2 border-white/60 shadow-md hover:shadow-lg`}
                            >
                              Focus: {face.title || `Side ${idx + 1}`}
                            </button>
                          ))}
                          <button
                             onClick={() => setRotation({x: -15, y: -25})}
                             className="px-5 py-2.5 rounded-xl text-sm font-bold bg-white text-slate-600 hover:text-indigo-600 transition-all hover:scale-105 active:scale-95 border-2 border-slate-200 shadow-md flex items-center gap-2"
                          >
                            <RotateCcw size={16} /> Reset Position
                          </button>
                        </div>
                      )}
                    </div>
                  )}
                </div>

                {mode === 'edit' && (
                  <div className="w-full lg:w-[400px] bg-white/80 backdrop-blur-xl border-l border-white/50 shadow-[-10px_0_30px_rgba(0,0,0,0.03)] flex flex-col h-[50vh] lg:h-auto overflow-hidden z-20">
                    <div className="p-5 border-b border-slate-100 flex items-center justify-between bg-white/50">
                      <div className="flex items-center gap-2">
                        <Edit3 size={20} className="text-indigo-600" />
                        <h2 className="font-extrabold text-slate-800 text-lg">Edit Content</h2>
                      </div>
                      <button 
                        onClick={resetToDefaults}
                        className="text-xs flex items-center gap-1.5 px-3 py-1.5 bg-red-50 text-red-600 rounded-lg hover:bg-red-100 font-bold transition-colors"
                        title="Reset all fields to default"
                      >
                        <Trash2 size={14} /> Reset
                      </button>
                    </div>
                    
                    <div className="flex-1 overflow-y-auto p-5 space-y-6 custom-scrollbar">
                      {activeFaces.map((face, index) => (
                        <div key={face.id} className="bg-white border-2 border-slate-100 rounded-2xl p-5 space-y-4 shadow-sm relative overflow-hidden">
                          <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${PALETTE[face.color].split(' ')[0]}`}></div>
                          
                          <div className="flex items-center justify-between pl-2">
                            <label className="text-xs font-extrabold text-slate-400 uppercase tracking-widest">
                              Side {index + 1}
                            </label>
                          </div>
                          
                          <div className="flex items-center gap-2">
                            <input
                              type="text"
                              value={face.icon || ''}
                              onChange={(e) => handleFaceChange(face.id, 'icon', e.target.value)}
                              placeholder="🎨"
                              title="Set an emoji or icon for this side"
                              className="w-16 font-bold text-2xl p-2 text-center bg-slate-50 border-2 border-transparent rounded-xl focus:bg-white focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 outline-none transition-all"
                            />
                            <input
                              type="text"
                              value={face.title}
                              onChange={(e) => handleFaceChange(face.id, 'title', e.target.value)}
                              placeholder="Enter Title..."
                              className="flex-1 font-bold text-lg p-3 bg-slate-50 border-2 border-transparent rounded-xl focus:bg-white focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 outline-none transition-all text-slate-800 placeholder:text-slate-300"
                            />
                          </div>
                          
                          <textarea
                            value={face.content}
                            onChange={(e) => handleFaceChange(face.id, 'content', e.target.value)}
                            placeholder="Enter bullet points or text here..."
                            rows={5}
                            className="w-full p-3 bg-slate-50 border-2 border-transparent rounded-xl focus:bg-white focus:border-indigo-300 focus:ring-4 focus:ring-indigo-100 outline-none resize-none transition-all text-[1.05rem] font-medium leading-relaxed text-slate-700 placeholder:text-slate-300 custom-scrollbar"
                          />
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </main>

              {showPrompt && (
                <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                    <div className="p-4 border-b bg-slate-50 flex items-center justify-between">
                      <div className="flex items-center gap-2 text-purple-700 font-bold">
                        <Sparkles size={20} />
                        <h2>Generate Content with AI</h2>
                      </div>
                      <button onClick={() => setShowPrompt(false)} className="text-slate-400 hover:text-slate-600 p-1 rounded-full hover:bg-slate-100 transition-colors">
                        <X size={20} />
                      </button>
                    </div>
                    <div className="p-6 overflow-y-auto flex flex-col gap-4">
                      <p className="text-sm text-slate-600">
                        Fill in the details below. We will automatically write the perfect prompt for you to copy and paste into ChatGPT or Claude!
                      </p>
                      
                      <div className="bg-purple-50 p-4 rounded-xl border border-purple-100 space-y-4">
                        <div>
                          <label className="block text-sm font-extrabold text-purple-900 mb-1">1. What course are you taking?</label>
                          <select 
                            value={promptCourse}
                            onChange={(e) => setPromptCourse(e.target.value)}
                            className="w-full p-2.5 rounded-lg border border-purple-200 bg-white focus:ring-2 focus:ring-purple-400 outline-none text-slate-700 font-medium"
                          >
                            <option>OCR A Level PE</option>
                            <option>Pearson BTEC Sport Level 3</option>
                            <option>AQA A Level PE</option>
                            <option>General Anatomy & Physiology</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-extrabold text-purple-900 mb-1">2. What topic do you need to revise?</label>
                          <input 
                            type="text"
                            value={promptTopic}
                            onChange={(e) => setPromptTopic(e.target.value)}
                            placeholder="e.g. The Cardiac Cycle, Sliding Filament Theory..."
                            className="w-full p-2.5 rounded-lg border border-purple-200 bg-white focus:ring-2 focus:ring-purple-400 outline-none text-slate-700 font-medium placeholder:text-slate-400"
                          />
                        </div>
                      </div>

                      <p className="text-sm font-bold text-slate-700 mt-2">
                        3. Copy this and paste it into your AI:
                      </p>

                      <div className="relative group">
                        <pre className="bg-slate-100 p-4 rounded-lg text-sm text-slate-700 whitespace-pre-wrap font-mono border border-slate-200 h-48 overflow-y-auto custom-scrollbar">
                          {dynamicPrompt}
                        </pre>
                        <button 
                          onClick={copyToClipboard}
                          className="absolute top-4 right-4 p-2 bg-white rounded-md shadow border hover:bg-slate-50 transition-colors flex items-center gap-2 text-sm font-medium text-slate-700 z-10"
                        >
                          {copied ? <><Check size={16} className="text-green-500"/> Copied!</> : <><Copy size={16}/> Copy Prompt</>}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

              <style dangerouslySetInnerHTML={{__html: `
                .custom-scrollbar::-webkit-scrollbar { width: 6px; }
                .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
                .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); border-radius: 10px; }
              `}} />
            </div>
          );
        }

        // Render the App
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
